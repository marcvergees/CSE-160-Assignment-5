<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>My first three.js app</title>
    <style>
        body {
            margin: 0;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #loading .progress {
            margin: 1.5em;
            border: 1px solid white;
            width: 50vw;
        }

        #loading .progressbar {
            margin: 2px;
            background: white;
            height: 1em;
            transform-origin: top left;
            transform: scaleX(0);
        }

        #c {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        body {
            background-color: #222;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div id="loading">
        <div class="progress">
            <div class="progressbar"></div>
        </div>
    </div>
    <canvas id="c"></canvas>
    <script type="module" src="main.js"></script>
</body>

</html>
